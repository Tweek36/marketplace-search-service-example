services:
  search-postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: search_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d search_db"]
      interval: 2s
      timeout: 3s
      retries: 20
    networks:
      - marketplace

  search-migrate:
    build:
      context: .
    command: ["uv", "run", "alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@search-postgres:5432/search_db
    depends_on:
      search-postgres:
        condition: service_healthy
    networks:
      - marketplace

  search-service:
    build:
      context: .
    command: ["uv", "run", "python", "-m", "bin.api"]
    environment:
      POSTGRES_USERNAME: ${POSTGRES_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: ${POSTGRES_HOST:-search-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DATABASE_NAME: ${POSTGRES_DATABASE_NAME:-search_db}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BROKERS:-redpanda:29092}
      KAFKA_TOPIC_ADS: ${KAFKA_TOPIC_MARKETPLACE_ADS:-ads}
    depends_on:
      search-postgres:
        condition: service_healthy
      search-migrate:
        condition: service_completed_successfully
    networks:
      - marketplace

  search-consumer:
    build:
      context: .
    command: ["uv", "run", "python", "-m", "bin.consumer"]
    environment:
      POSTGRES_USERNAME: ${POSTGRES_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: ${POSTGRES_HOST:-search-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DATABASE_NAME: ${POSTGRES_DATABASE_NAME:-search_db}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BROKERS:-redpanda:29092}
      KAFKA_TOPIC_ADS: ${KAFKA_TOPIC_MARKETPLACE_ADS:-ads}
      AD_SERVICE_URL: ${AD_SERVICE_URL:-http://student-tweek36-marketplace-ad-service-web.student-tweek36-marketplace-ad-service.svc:8000}
    depends_on:
      search-postgres:
        condition: service_healthy
      search-migrate:
        condition: service_completed_successfully
    networks:
      - marketplace

networks:
  marketplace:
    name: marketplace
    external: true

volumes:
  pgdata:
