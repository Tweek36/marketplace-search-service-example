services:
  search-postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DATABASE_NAME:-student_Tweek36-marketplace-search-service-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME:-postgres} -d ${POSTGRES_DATABASE_NAME:-student_Tweek36-marketplace-search-service-postgres}"]
      interval: 2s
      timeout: 3s
      retries: 20
    networks:
      - marketplace

  search-migrate:
    build:
      context: .
    command: ["python", "-m", "alembic", "upgrade", "head"]
    environment:
      POSTGRES_DATABASE_NAME: ${POSTGRES_DATABASE_NAME:-student_Tweek36-marketplace-search-service-postgres}
      POSTGRES_HOST: search-postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USERNAME: ${POSTGRES_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      search-postgres:
        condition: service_healthy
    networks:
      - marketplace

  search-service:
    build:
      context: .
    command: ["python", "-m", "bin.api"]
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DATABASE_NAME: ${POSTGRES_DATABASE_NAME:-student_Tweek36-marketplace-search-service-postgres}
      POSTGRES_HOST: search-postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USERNAME: ${POSTGRES_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      kafka_bootstrap_servers: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:9092}
      kafka_topic_ads: ${KAFKA_TOPIC_ADS:-ads}
      kafka_consumer_group: ${KAFKA_CONSUMER_GROUP:-search-service}
      ad_service_url: ${AD_SERVICE_URL:-http://student-tweek36-marketplace-ad-service-web.student-tweek36-marketplace-ad-service.svc.cluster.local:8000}
    depends_on:
      search-postgres:
        condition: service_healthy
      search-migrate:
        condition: service_completed_successfully
    networks:
      - marketplace

  search-consumer:
    build:
      context: .
    command: ["python", "-m", "bin.consumer"]
    environment:
      POSTGRES_DATABASE_NAME: ${POSTGRES_DATABASE_NAME:-student_Tweek36-marketplace-search-service-postgres}
      POSTGRES_HOST: search-postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USERNAME: ${POSTGRES_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      kafka_bootstrap_servers: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:9092}
      kafka_topic_ads: ${KAFKA_TOPIC_ADS:-ads}
      kafka_consumer_group: ${KAFKA_CONSUMER_GROUP:-search-service}
      ad_service_url: ${AD_SERVICE_URL:-http://student-tweek36-marketplace-ad-service-web.student-tweek36-marketplace-ad-service.svc.cluster.local:8000}
    depends_on:
      search-postgres:
        condition: service_healthy
      search-migrate:
        condition: service_completed_successfully
    networks:
      - marketplace

networks:
  marketplace:
    name: marketplace
    external: true

volumes:
  pgdata:
